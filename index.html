<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starlight Voice Classifier</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 680px;
      margin: 30px auto;
      padding: 0 16px;
    }

    h1 {
      margin-bottom: 4px;
    }

    p.intro {
      color: #555;
      margin-bottom: 16px;
    }

    #statusBar {
      margin-bottom: 12px;
      font-size: 0.9em;
      color: #555;
      min-height: 1.2em;
    }

    .voice-card {
      border: 1px solid #ccc;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .voice-card .name {
      font-size: 1.6em;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .voice-card .meta {
      font-size: 0.85em;
      color: #666;
    }

    .field {
      margin-bottom: 16px;
    }

    .field>label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .tags-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .tags-grid label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 0.95em;
    }

    .section-divider {
      border: none;
      border-top: 1px dashed #bbb;
      margin: 12px 0;
    }

    .custom-section-label {
      font-size: 0.8em;
      color: #777;
      margin-bottom: 6px;
    }

    .tag-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      position: relative;
    }

    .tag-input-row input {
      flex: 1;
      padding: 6px 10px;
      font-size: 0.95em;
    }

    .tag-input-row button {
      padding: 6px 14px;
      font-size: 0.95em;
      cursor: pointer;
    }

    .autocomplete-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: calc(100% - 74px);
      /* aligns with input width */
      background: #fff;
      border: 1px solid #ccc;
      border-top: none;
      z-index: 999;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .autocomplete-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9em;
    }

    .autocomplete-item:hover,
    .autocomplete-item.selected {
      background: #f0f0f0;
    }

    .active-tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e2e8f0;
      color: #334155;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 500;
    }

    .tag-chip .remove-btn {
      cursor: pointer;
      font-weight: bold;
      color: #94a3b8;
    }

    .tag-chip .remove-btn:hover {
      color: #ef4444;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .actions button {
      padding: 8px 18px;
      font-size: 1em;
      cursor: pointer;
    }

    #submitBtn {
      font-weight: bold;
    }

    #submitStatus {
      margin-top: 8px;
      font-size: 0.85em;
      color: #555;
      min-height: 1em;
    }

    .session-log {
      margin-top: 28px;
      border-top: 1px solid #ddd;
      padding-top: 12px;
    }

    .session-log h3 {
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    .session-log ul {
      font-size: 0.82em;
      color: #666;
      padding-left: 18px;
      margin: 0;
    }

    .session-log ul li {
      margin-bottom: 3px;
    }
  </style>
</head>

<body>

  <h1>Starlight Voice Classifier</h1>
  <p class="intro">
    Help classify TTS voices for Space Station 14. You'll see one random unclassified voice at a time.
    Select its pitch and any applicable tags, then hit <strong>Submit &amp; Next</strong> (or press
    <strong>Enter</strong>).
    Skip if you don't recognise it.
  </p>

  <div id="statusBar">Loading…</div>

  <div id="voiceCard" class="voice-card" style="display:none">
    <div class="name" id="voiceName"></div>
    <div class="meta" id="voiceMeta"></div>
  </div>

  <div id="formArea" style="display:none">

    <div class="field">
      <label for="pitchSelect">Pitch <span class="custom-section-label"
          style="display:inline; font-weight:normal; margin-left:8px;">(Hotkeys: 1/2/3, 0 to clear)</span></label>
      <select id="pitchSelect">
        <option value="">— Unspecified —</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <div class="field">
      <label>Tags</label>
      <div class="tag-input-row">
        <input type="text" id="newTagInput" placeholder="Type to search/add tags (e.g. breathy, american)..."
          autocomplete="off">
        <button type="button" onclick="addCustomTag()">Add</button>
        <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
      </div>
      <div class="active-tags-container" id="activeTagsContainer"></div>
      <div class="tags-grid" id="presetTagsGrid"></div>

      <hr class="section-divider">
      <div class="custom-section-label">Additional tags</div>
      <div class="tags-grid" id="customTagsGrid"></div>
    </div>

    <div id="submitStatus"></div>

    <div class="actions">
      <button type="button" id="submitBtn" onclick="submitClassification()">Submit &amp; Next</button>
      <button type="button" onclick="skipVoice()">Skip</button>
    </div>
  </div>

  <div class="session-log">
    <h3>This session: <span id="sessionCount">0</span> submitted</h3>
    <ul id="sessionLog"></ul>
  </div>

    // ── State ─────────────────────────────────────────────────────────────────────

    // Stable session ID (anonymous, local-only)
    let sessionId = localStorage.getItem("starlight_session_id");
    if (!sessionId) {
      sessionId = ([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
      localStorage.setItem("starlight_session_id", sessionId);
    }

    // Custom tags (persistent, user-local)
    let customTags = JSON.parse(localStorage.getItem("starlight_custom_tags") || "[]");

    // Runtime state
    let classifiedCounts = {}; // { voice_id: count }
    let queue = [];            // voices, sorted by fewest classifications, shuffled within counts
    let currentVoice = null;
    let sessionLog = [];       // [{name, pitch, tags}]

    // ── Init ──────────────────────────────────────────────────────────────────────

    async function init() {
      renderPresetTags();
      renderCustomTags();
      setStatus("Loading…");

      if (APPS_SCRIPT_URL) {
        try {
          const res = await fetch(APPS_SCRIPT_URL + "?action=getClassified");
          const data = await res.json();
          classifiedCounts = data.counts || {};
        } catch (e) {
          setStatus("Could not reach backend — showing all voices randomly.");
        }
      } else {
        setStatus("⚠ No backend configured (APPS_SCRIPT_URL is empty). Running in demo mode — submissions won't be saved.");
      }

      buildQueue();
      showNext();
    }

    function buildQueue() {
      // Map counts to all voices
      const voiceWithCounts = VOICES.map(v => ({
        voice: v,
        count: classifiedCounts[v.id] || 0
      }));

      // Group voices by their classification count
      const groups = {};
      voiceWithCounts.forEach(vc => {
        if (!groups[vc.count]) groups[vc.count] = [];
        groups[vc.count].push(vc.voice);
      });

      // Sort the count groups ascending (least classifications first)
      const sortedCounts = Object.keys(groups).map(Number).sort((a, b) => a - b);

      // Build the queue by shuffling each group and concatenating
      queue = [];
      sortedCounts.forEach(c => {
        const group = groups[c];
        // Fisher-Yates shuffle the group
        for (let i = group.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [group[i], group[j]] = [group[j], group[i]];
        }
        queue = queue.concat(group);
      });

      // Total submissions
      const totalSubmissions = Object.values(classifiedCounts).reduce((a, b) => a + b, 0);

      document.getElementById("statusBar").textContent =
        `Submissions: ${totalSubmissions} | Next voice count: ${classifiedCounts[queue[0]?.id] || 0} classification(s)`;
    }

    function showNext() {
      if (queue.length === 0) {
        document.getElementById("voiceCard").style.display = "none";
        document.getElementById("formArea").style.display = "none";
        setStatus("All voices have been classified — thank you!");
        return;
      }

      currentVoice = queue.shift();

      // Voice card
      document.getElementById("voiceName").textContent = currentVoice.name;
      const parts = [currentVoice.sex];
      if (currentVoice.silicon) parts.push("Silicon");
      parts.push(currentVoice.id);
      document.getElementById("voiceMeta").textContent = parts.join(" · ");
      document.getElementById("voiceCard").style.display = "";
      document.getElementById("formArea").style.display = "";

      // Reset form
      document.getElementById("pitchSelect").value = "";
      document.querySelectorAll(".tags-grid input[type=checkbox]").forEach(cb => cb.checked = false);
      setSubmitStatus("");

      // Update tags UI
      updateActiveTagsUI();
    }

    // ── Tags ──────────────────────────────────────────────────────────────────────

    function renderPresetTags() {
      const container = document.getElementById("presetTagsGrid");
      container.innerHTML = "";
      container.style.display = "block"; // Override grid layout to stack category grids

      for (const [groupName, tags] of Object.entries(PRESET_TAGS)) {
        const header = document.createElement("div");
        header.className = "custom-section-label";
        header.style.marginTop = "12px";
        header.style.marginBottom = "6px";
        header.style.fontWeight = "bold";
        header.textContent = groupName.charAt(0).toUpperCase() + groupName.slice(1);
        container.appendChild(header);

        const subGrid = document.createElement("div");
        subGrid.className = "tags-grid";
        buildTagsGrid(subGrid, tags);
        container.appendChild(subGrid);
      }
    }

    function renderCustomTags() {
      buildTagsGrid(document.getElementById("customTagsGrid"), customTags);
    }

    function buildTagsGrid(container, tags) {
      container.innerHTML = "";
      tags.forEach(tag => {
        const label = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = tag;
        cb.addEventListener("change", updateActiveTagsUI);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(" " + tag));
        container.appendChild(label);
      });
    }

    function updateActiveTagsUI() {
      const container = document.getElementById("activeTagsContainer");
      container.innerHTML = "";

      const checked = [];
      document.querySelectorAll(".tags-grid input[type=checkbox]:checked").forEach(cb => {
        checked.push(cb.value);

        // Create chip
        const chip = document.createElement("span");
        chip.className = "tag-chip";
        chip.textContent = cb.value;

        const removeBtn = document.createElement("span");
        removeBtn.className = "remove-btn";
        removeBtn.textContent = " ×";
        removeBtn.onclick = () => {
          cb.checked = false;
          updateActiveTagsUI();
        };

        chip.appendChild(removeBtn);
        container.appendChild(chip);
      });
    }

    function addCustomTag() {
      const input = document.getElementById("newTagInput");
      const tag = input.value.trim().toLowerCase().replace(/\s+/g, "-");
      if (!tag) return;

      if (!customTags.includes(tag) && !FLAT_PRESET_TAGS.includes(tag)) {
        customTags.push(tag);
        localStorage.setItem("starlight_custom_tags", JSON.stringify(customTags));
        renderCustomTags();
      }

      // Check the custom checkbox
      setTimeout(() => {
        document.querySelectorAll("#customTagsGrid input[type=checkbox]").forEach(cb => {
          if (cb.value === tag) cb.checked = true;
        });
        updateActiveTagsUI();
      }, 0);

      input.value = "";
      hideDropdown();
    }

    // Autocomplete tags dropdown logic
    const newTagInput = document.getElementById("newTagInput");
    const dropdown = document.getElementById("autocompleteDropdown");
    let selectedIndex = -1;
    let filteredSuggestions = [];

    newTagInput.addEventListener("input", function () {
      const val = this.value.trim().toLowerCase();
      selectedIndex = -1;

      if (!val) {
        hideDropdown();
        return;
      }

      const allTags = [...new Set([...FLAT_PRESET_TAGS, ...customTags])];
      filteredSuggestions = allTags.filter(tag => tag.includes(val));

      // Don't show already checked ones
      const checkedTags = Array.from(document.querySelectorAll(".tags-grid input[type=checkbox]:checked")).map(cb => cb.value);
      filteredSuggestions = filteredSuggestions.filter(tag => !checkedTags.includes(tag));

      if (filteredSuggestions.length === 0) {
        hideDropdown();
        return;
      }

      renderDropdown();
    });

    function renderDropdown() {
      dropdown.innerHTML = "";
      filteredSuggestions.forEach((tag, idx) => {
        const item = document.createElement("div");
        item.className = `autocomplete-item${idx === selectedIndex ? ' selected' : ''}`;
        item.textContent = tag;
        item.onclick = () => selectSuggestion(tag);
        dropdown.appendChild(item);
      });
      dropdown.style.display = "block";
    }

    function selectSuggestion(tag) {
      if (FLAT_PRESET_TAGS.includes(tag)) {
        document.querySelectorAll("#presetTagsGrid input[type=checkbox]").forEach(cb => {
          if (cb.value === tag) cb.checked = true;
        });
      } else {
        if (!customTags.includes(tag)) {
          customTags.push(tag);
          localStorage.setItem("starlight_custom_tags", JSON.stringify(customTags));
          renderCustomTags();
        }
        setTimeout(() => {
          document.querySelectorAll("#customTagsGrid input[type=checkbox]").forEach(cb => {
            if (cb.value === tag) cb.checked = true;
          });
          updateActiveTagsUI();
        }, 0);
      }

      updateActiveTagsUI();
      newTagInput.value = "";
      hideDropdown();
    }

    function hideDropdown() {
      dropdown.style.display = "none";
      dropdown.innerHTML = "";
      selectedIndex = -1;
    }

    newTagInput.addEventListener("keydown", function (e) {
      if (dropdown.style.display === "block") {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          selectedIndex = (selectedIndex + 1) % filteredSuggestions.length;
          renderDropdown();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          selectedIndex = (selectedIndex - 1 + filteredSuggestions.length) % filteredSuggestions.length;
          renderDropdown();
        } else if (e.key === "Enter" || e.key === "Tab") {
          if (selectedIndex >= 0) {
            e.preventDefault();
            selectSuggestion(filteredSuggestions[selectedIndex]);
          } else {
            e.preventDefault();
            addCustomTag();
          }
        } else if (e.key === "Escape") {
          e.preventDefault();
          hideDropdown();
        }
      } else {
        if (e.key === "Enter") {
          e.preventDefault();
          addCustomTag();
        }
      }
    });

    // Hide autocomplete dropdown when clicking outside
    document.addEventListener("click", function (e) {
      if (e.target !== newTagInput && e.target !== dropdown) {
        hideDropdown();
      }
    });

    // ── Submit / Skip ─────────────────────────────────────────────────────────────

    async function submitClassification() {
      if (!currentVoice) return;

      const pitch = document.getElementById("pitchSelect").value;
      const tags = [];
      document.querySelectorAll(".tags-grid input[type=checkbox]:checked").forEach(cb => tags.push(cb.value));

      // If no pitch and no tags are selected, treat as a skip
      if (!pitch && tags.length === 0) {
        skipVoice();
        return;
      }

      const payload = {
        session_id: sessionId,
        voice_id: currentVoice.id,
        pitch: pitch,
        tags: tags.join(","),
        submitted_at: new Date().toISOString(),
      };

      setSubmitStatus("Submitting…");

      // Optimistically increment local classification count so it goes to the back
      classifiedCounts[currentVoice.id] = (classifiedCounts[currentVoice.id] || 0) + 1;

      if (APPS_SCRIPT_URL) {
        try {
          fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },  // avoids CORS preflight
            body: JSON.stringify(payload),
          }).then(res => {
            if (!res.ok) {
              setSubmitStatus("⚠ Submission failed on server.");
            }
          }).catch(err => {
            setSubmitStatus("⚠ Network error on submission.");
          });
        } catch (e) {
          setSubmitStatus("Network error — moving on anyway.");
        }
      }

      // Session log
      sessionLog.unshift({ name: currentVoice.name, pitch, tags });
      updateSessionLog();

      showNext();
    }

    function skipVoice() {
      if (currentVoice) queue.push(currentVoice);
      showNext();
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────────

    function setStatus(msg) {
      document.getElementById("statusBar").textContent = msg;
    }

    // Helper to update submit feedback
    function setSubmitStatus(msg) {
      document.getElementById("submitStatus").textContent = msg;
    }

    function updateSessionLog() {
      document.getElementById("sessionCount").textContent = sessionLog.length;
      const ul = document.getElementById("sessionLog");
      ul.innerHTML = "";
      sessionLog.slice(0, 15).forEach(s => {
        const li = document.createElement("li");
        const tagStr = s.tags.length ? s.tags.join(", ") : "no tags";
        const pitchStr = s.pitch || "no pitch";
        li.textContent = `${s.name} — ${pitchStr} — ${tagStr}`;
        ul.appendChild(li);
      });
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────────────────

    document.addEventListener("keydown", e => {
      // Alt+T focuses the tag input globally
      if (e.altKey && e.key.toLowerCase() === "t") {
        e.preventDefault();
        document.getElementById("newTagInput").focus();
        return;
      }

      const active = document.activeElement;

      // Don't trigger hotkeys if typing in inputs/selects
      if (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.tagName === "SELECT") {
        return;
      }

      // Pitch hotkeys
      if (e.key === "1") {
        document.getElementById("pitchSelect").value = "Low";
      } else if (e.key === "2") {
        document.getElementById("pitchSelect").value = "Medium";
      } else if (e.key === "3") {
        document.getElementById("pitchSelect").value = "High";
      } else if (e.key === "0") {
        document.getElementById("pitchSelect").value = "";
      }

      // Skip hotkey
      if (e.key.toLowerCase() === "s") {
        skipVoice();
      }



      // Enter to submit
      if (e.key === "Enter") {
        submitClassification();
      }
    });

    // ── Boot ──────────────────────────────────────────────────────────────────────
    init();
  </script>

const SHEET_NAME = "submissions";

function doGet(e) {
  if (e.parameter.action === "getClassified") {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(SHEET_NAME);
    if (!sheet) {
      return ContentService
        .createTextOutput(JSON.stringify({ counts: {} }))
        .setMimeType(ContentService.MimeType.JSON);
    }
    const data  = sheet.getDataRange().getValues();
    const counts = {};
    for (let i = 1; i < data.length; i++) {
      const voiceId = data[i][1];
      if (voiceId) {
        counts[voiceId] = (counts[voiceId] || 0) + 1;
      }
    }
    return ContentService
      .createTextOutput(JSON.stringify({ counts: counts }))
      .setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput("ok");
}

function doPost(e) {
  try {
    const payload = JSON.parse(e.postData.contents);

    // Basic validation — drop garbage
    const validPitch = ["Low", "Medium", "High", ""];
    if (!payload.voice_id) return ContentService.createTextOutput("bad");
    if (!validPitch.includes(payload.pitch || "")) return ContentService.createTextOutput("bad");

    const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(SHEET_NAME);
    sheet.appendRow([
      payload.session_id   || "",
      payload.voice_id     || "",
      payload.pitch        || "",
      payload.tags         || "",
      payload.submitted_at || new Date().toISOString(),
    ]);
  } catch(err) {
    // Swallow — don't expose internals
  }
  return ContentService.createTextOutput("ok");
}

  const ss    = SpreadsheetApp.getActiveSpreadsheet();
  let sheet   = ss.getSheetByName(SHEET_NAME);
  if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
  sheet.getRange(1, 1, 1, 5).setValues([["session_id","voice_id","pitch","tags","submitted_at"]]);
}
